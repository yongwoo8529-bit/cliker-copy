<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건강한 변화, 함께 만드는 새로운 삶</title>
    <meta name="description" content="열심히 살았는데도 늘 제자리라면, 이제는 노력보다 수익 구조를 바꿔야 할 때입니다.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="page-wrap">

    <!-- 히어로 섹션 -->
    <section class="hero">
        <div class="hero-content">
            <div class="tag-line">
                <span class="tag-bar"></span>
                건강한 변화, 함께 만드는 새로운 삶
            </div>

            <h2 class="hero-sub-heading">
                열심히 살았는데도<br>늘 제자리라면,
            </h2>

            <div class="divider-line"></div>

            <h1 class="hero-heading">
                이제는<br>
                노력보다<br>
                <em class="accent-text">'수익 구조'</em>를<br>
                바꿔야 할 때입니다.
            </h1>

            <blockquote class="hero-quote">
                <div class="quote-bar"></div>
                <p>
                    더 건강하고 더 자유로운 삶,<br>
                    당신의 경험과 시간이<br>
                    누군가의 변화와 수익이 됩니다.
                </p>
            </blockquote>

        </div>
    </section>

    <!-- 특징 섹션 -->
    <section class="features">
        <div class="features-inner">
            <button class="feature-btn" onclick="handleFeature('전문적인 시스템')">
                <div class="feature-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="14" r="7" stroke="currentColor" stroke-width="2"/>
                        <path d="M10 38c0-7.732 6.268-14 14-14s14 6.268 14 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M20 28l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h3 class="feature-title">전문적인 시스템</h3>
                <p class="feature-desc">체계적인 교육과<br>맞춤형 운영 지원</p>
            </button>

            <button class="feature-btn" onclick="handleFeature('안정적인 수익 구조')">
                <div class="feature-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="6" y="28" width="8" height="14" rx="1" stroke="currentColor" stroke-width="2"/>
                        <rect x="20" y="20" width="8" height="22" rx="1" stroke="currentColor" stroke-width="2"/>
                        <rect x="34" y="12" width="8" height="30" rx="1" stroke="currentColor" stroke-width="2"/>
                        <path d="M8 22l10-8 10 4 12-12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M36 6l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h3 class="feature-title">안정적인 수익 구조</h3>
                <p class="feature-desc">지속 가능한 수익 모델로<br>경제적 자유 실현</p>
            </button>

            <button class="feature-btn" onclick="handleFeature('따뜻한 커뮤니티')">
                <div class="feature-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
                        <circle cx="10" cy="20" r="4" stroke="currentColor" stroke-width="2"/>
                        <circle cx="38" cy="20" r="4" stroke="currentColor" stroke-width="2"/>
                        <path d="M4 38c0-6.627 2.686-8 6-8s5 1 5 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M44 38c0-6.627-2.686-8-6-8s-5 1-5 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M14 38c0-7.18 4.477-10 10-10s10 2.82 10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h3 class="feature-title">따뜻한 커뮤니티</h3>
                <p class="feature-desc">함께 성장하는<br>파트너 네트워크</p>
            </button>
        </div>
    </section>

    <!-- CTA 섹션 -->
    <section class="cta">
        <p class="cta-text">
            당신의 경험이 누군가의 인생을 바꾸고,<br>
            당신의 선택이 당신의 미래를 바꿉니다.
        </p>
        <div class="cta-heart">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" width="20" height="20">
                <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/>
            </svg>
        </div>
        <a href="#" class="cta-btn">
            이 일에 대해 궁금하다면, 상담 신청하기 &nbsp;→
        </a>
    </section>

    <script src="script.js"></script>
</div>
</body>
</html>
